<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Veliner · Guiones</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Guiones virales</h1>
          <p>Hooks + estructura + CTA (listo para grabar)</p>
        </div>
      </div>
      <div class="nav">
        <a class="pill" href="index.html">← Dashboard</a>
        <a class="pill" href="calendar.html">📅 Calendario</a>
        <a class="pill" href="metrics.html">📊 Métricas</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="panel" id="packs">
      <div class="form">
        <div class="field">
          <label>Cuenta (arroba)</label>
          <input id="handle" placeholder="ej: @velinerugc" value="@velinerugc" />
        </div>
        <div class="field">
          <label>Tipo</label>
          <select id="type">
            <option value="brand" selected>Marca / Estudio</option>
            <option value="creator">Creador UGC</option>
          </select>
        </div>
        <div class="field">
          <label>Objetivo</label>
          <select id="goal">
            <option value="grow" selected>Crecer</option>
            <option value="sell">Vender</option>
            <option value="auth">Autoridad</option>
          </select>
        </div>
        <div class="field">
          <label>Formato</label>
          <input value="Reels + TikTok" disabled />
        </div>
      </div>

      <div class="hr"></div>

      <button class="btn" id="gen">Crear guiones</button>
      <button class="btn secondary" id="copy">Copiar guiones</button>

      <p style="margin-top:10px;color:rgba(244,244,255,.55);font-size:12px">
        Nota: “supervirales” = estructura + ejecución. Luego conectamos IA para adaptarlos a tendencias reales.
      </p>
    </div>

    <div class="results" id="out"></div>
    <div class="footer">Veliner OS · Guiones</div>
  </div>

  <script src="app.js"></script>
  <script>
    const out = document.getElementById("out");
    const btn = document.getElementById("gen");
    const copy = document.getElementById("copy");

    function render(pack){
      let html = `
        <div class="result">
          <h4>🎬 Pack de guiones para @${pack.handle}</h4>
          <div class="meta">${pack.note}</div>
        </div>
      `;
      pack.scripts.forEach(s=>{
        html += `
          <div class="result">
            <h4>${s.title}</h4>
            <div class="meta"><b>Hook:</b> ${s.hook}</div>
            <ul class="list">
              ${s.body.map(x=>`<li>${x}</li>`).join("")}
            </ul>
            <div class="hr"></div>
            <div style="color:rgba(244,244,255,.7); font-size:13px"><b>Por qué funciona:</b> ${s.why}</div>
          </div>
        `;
      });
      out.innerHTML = html;
      window.__lastScriptsText = out.innerText;
    }

    btn.addEventListener("click", ()=>{
      const handle = VelinerOS.sanitizeHandle(document.getElementById("handle").value);
      const type = document.getElementById("type").value;
      const goal = document.getElementById("goal").value;
      render(VelinerOS.scriptPack(handle, type, goal));
    });

    copy.addEventListener("click", async ()=>{
      if(!window.__lastScriptsText){
        alert("Primero genera los guiones 🙂");
        return;
      }
      try{
        await navigator.clipboard.writeText(window.__lastScriptsText);
        alert("Guiones copiados ✅");
      }catch(e){
        alert("En iPad a veces falla copiar. Mantén pulsado y copia manual si hace falta.");
      }
    });

    btn.click();
  </script>
</body>
</html>
